<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

/* BUTTON */
button {
  padding: 15px 35px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px rgba(255,255,255,0.8);
}

/* FULL SCREEN IMAGE SCREEN */
#imageScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: black;
}

#imageScreen img {
  max-width: 100%;
  max-height: 80%;
}

#text {
  margin-top: 20px;
  font-size: 24px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<button onclick="openScreen()">Open</button>

<div id="imageScreen">
  <img src="IMG-20260420-WA0010.jpg" alt="Image">
  <div id="text">MIL JAEGA KYA?</div>
</div>

<!-- AUDIO -->
<audio id="myAudio" loop>
  <source src="AUD-20260424-WA0008.mp3" type="audio/mpeg">
</audio>

<script>
function openScreen() {
  document.getElementById("imageScreen").style.display = "flex";
  document.querySelector("button").style.display = "none";

  let audio = document.getElementById("myAudio");
  audio.play();
}
</script>

</body>
</html>
